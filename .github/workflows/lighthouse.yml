name: Lighthouse CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npx wrangler pages dev dist --port 4173 >/tmp/wrangler.log 2>&1 &
      - run: npx wait-on http://127.0.0.1:4173/
      - uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            http://127.0.0.1:4173/
            http://127.0.0.1:4173/plan
            http://127.0.0.1:4173/wiedza
          uploadArtifacts: true
          temporaryPublicStorage: true
